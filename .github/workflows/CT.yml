name: CT Dummy Tests

on:
  repository_dispatch:
    types: [ct-phase]

jobs:
  ct-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Show trigger info
        run: |
          echo "CT triggered from repo: ${{ github.event.client_payload.source_repo }}"
          echo "Event: ${{ github.event.client_payload.source_event }}"
          echo "Ref: ${{ github.event.client_payload.source_ref }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run pytest
        run: |
          pytest -q
